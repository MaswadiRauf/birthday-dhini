<body>
    <div class='aurora'></div>
    <div class='stars'></div>

        <div class="glass">
            <div class="heart-icon">
                ❤
            </div>

                • • • Untuk Dhini Oktavia Afantika • • •
            </p>

                Sebuah Kejutan
                <span>

                </div>
                <div class="time-box">
                    <span id="h">00</span>

                </div>

                    <small>Menit</small>
                </div>
                <div class="time-box">
                    <span id="s">00</span>
                    <small>Detik</small>
                </div>
            </div>
            <button id="open" disabled>
                🔒 Buka Kejutan
            </button>
            <p id="info">
                Sabar yaa Sayangkuu!!!
                ❤️
                <br>
                Sebentar lagi menuju hari yang spesial
            </p>
        </div>
    </section>
    <section id='scene2' class='scene'>
        <h1>🎉 Happy Birthday</h1>

        <p>Hari ini dunia menjadi lebih indah karena kehadiranmu.</p>
